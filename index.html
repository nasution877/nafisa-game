<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Untuk Nafisa 💖</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
}

.container {
  background: white;
  padding: 20px;
  margin: 30px auto;
  width: 320px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

img {
  width: 100%;
  border-radius: 15px;
}

button {
  padding: 10px;
  margin: 8px;
  border-radius: 10px;
  border: none;
  background: #ff6b81;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.hidden {
  display: none;
}

#gift {
  font-size: 50px;
  cursor: pointer;
  animation: bounce 1s infinite;
}

@keyframes bounce {
  0%,100%{transform: translateY(0);}
  50%{transform: translateY(-10px);}
}
</style>

</head>

<body>

<div class="container">
  <h2>🎁 Untuk Nafisa Putri</h2>
  <p>Dari Bg Fauzan 💙</p>

  <!-- SLIDER FOTO -->
  <img id="slider" src="foto1.jpg">

  <br>

  <!-- MUSIK -->
  <audio id="music" loop>
    <source src="lagu.mp3" type="audio/mpeg">
  </audio>
  <button onclick="playMusic()">🎵 Play Musik</button>

  <p>Tebak angka 1 - 20 😆</p>

  <input type="number" id="guess">
  <br>
  <button onclick="checkGuess()">Tebak</button>

  <p id="result"></p>

  <!-- KADO -->
  <div id="gift" class="hidden" onclick="openGift()">🎁</div>

  <!-- UCAPAN -->
  <div id="surprise" class="hidden">
    <h3>🎉 Selamat Nafisa!</h3>
    <p>
      Semoga panjang umur, sehat selalu 🤍  
      Semoga semua yang adek impikan tercapai ✨  
      Jangan lupa bahagia terus ya 😊  
      Dari abang yang selalu doain yang terbaik 💙
    </p>
    <p>🎂🎁💖</p>
  </div>
</div>

<script>
// ANGKA
let randomNumber = Math.floor(Math.random() * 20) + 1;

// FOTO SLIDER
let images = ["foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg","foto5.jpg"];
let index = 0;

setInterval(() => {
  index = (index + 1) % images.length;
  document.getElementById("slider").src = images[index];
}, 2000);

// MUSIK
function playMusic() {
  document.getElementById("music").play();
}

// GAME
function checkGuess() {
  let guess = Number(document.getElementById("guess").value);
  let result = document.getElementById("result");

  if (!guess) {
    result.innerHTML = "Isi dulu ya 😆";
    return;
  }

  if (guess === randomNumber) {
    result.innerHTML = "🎉 Benar!";
    document.getElementById("gift").classList.remove("hidden");
  } else if (guess < randomNumber) {
    result.innerHTML = "⬆️ Terlalu kecil";
  } else {
    result.innerHTML = "⬇️ Terlalu besar";
  }
}

// BUKA KADO
function openGift() {
  document.getElementById("gift").classList.add("hidden");
  document.getElementById("surprise").classList.remove("hidden");
}
</script>

</body>
</html>
